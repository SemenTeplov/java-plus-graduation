spring:
  cloud:
    gateway:
      discovery.locator.enabled: true
      routes:

        - id: event_service_route
          uri: lb://event-service
          predicates:
            - Path=/admin/events/**, /events/**, /users/*/events/**, /admin/comments/**, /comments/**, /admin/compilations/**, /compilations/**, /admin/categories/**, /categories/**

        - id: request_service_route
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**, /request/**

        - id: user_service_route
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**, /users/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true
      show-details: always

server:
  port: 8080