spring:
  cloud:
    gateway:
      discovery.locator.enabled: true
      routes:
        - id: category_service_route
          uri: lb://category-service
          predicates:
            - Path=/admin/categories/**
            - Path=/categories/**
        - id: comment_service_route
          uri: lb://comment-service
          predicates:
            - Path=/user/*/comments/**
            - Path=/admin/comments/**
            - Path=/comments/**
        - id: compilation_service_route
          uri: lb://compilation-service
          predicates:
            - Path=/admin/compilations/**
            - Path=/compilations/**
        - id: event_service_route
          uri: lb://event-service
          predicates:
            - Path=/users/client/{eventId}/{userId}/{status}/{count}
            - Path=/users/*/events/**
            - Path=/events/**
            - Path=/admin/events/**
        - id: request_service_route
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/**
            - Path=/request/**
            - Path=/users/requests
        - id: user_service_route
          uri: lb://user-service
          predicates:
            - Path=/users/client/check/{userId}
            - Path=/admin/users/**
            - Path=/users/{userId}
            - Path=/users/client

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true
      show-details: always

server:
  port: 8080