server:
  port: 0

kafka:
  bootstrap-servers: localhost:9092
  topics:
    user: stats.user-actions.v1
    events: stats.events-similarity.v1
  offset:
    rest-config: earliest
  consumer:
    session-timeout-ms: 45000
    heartbeat-interval-ms: 15000
    enable-auto-commit: false
  properties:
    reconnect-backoff-ms: 2000
    reconnect-backoff-max-ms: 60000
    retry-backoff-ms: 5000

grpc:
  server:
    port: 0
  client:
    analyzer:
      address: 'discovery:///analyzer'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/analyzer
    username: analyzer
    password: analyzer
  sql:
    init:
      mode: always
  kafka:
    listener:
      ack-mode: MANUAL_IMMEDIATE