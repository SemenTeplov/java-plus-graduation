spring:
  application:
    name: collector
  config:
    import: "configserver:"
  cloud:
    config:
      retry:
        useRandomPolicy: true
        max-interval: 6000
      discovery:
        enabled: true
        serviceId: config-server
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    metadata-map:
      grpc-port: ${grpc.server.port}
      management.port: ${management.server.port:}