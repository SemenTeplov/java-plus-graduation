spring:
  application:
    name: main-service
  config:
    import: "configserver:"
  cloud:
    config:
      fail-fast: false
      retry:
        useRandomPolicy: true
        max-interval: 6000
    discovery:
      enabled: true
      serviceId: config-server
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/